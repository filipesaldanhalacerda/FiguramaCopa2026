name: Keep Supabase awake

# Projetos Supabase no free tier pausam após ~7 dias sem requisições.
# Este job faz uma leitura leve 2x por semana para manter o banco ativo.
# Configure os secrets do repositório: SUPABASE_URL e SUPABASE_ANON_KEY.

on:
  schedule:
    - cron: '17 9 * * 1,4' # Segunda e Quinta, 09:17 UTC
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          curl -fsS \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/stickers?select=id&limit=1" \
            && echo "Supabase respondeu — projeto ativo."
