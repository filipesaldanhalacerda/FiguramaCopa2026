<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1430"/>
      <stop offset="0.55" stop-color="#0e3a2a"/>
      <stop offset="1" stop-color="#0b7a4b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.5">
      <stop offset="0" stop-color="#d29a26" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#d29a26" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fundo -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Círculos decorativos -->
  <circle cx="120" cy="560" r="200" fill="#0b7a4b" opacity="0.35"/>
  <circle cx="1080" cy="100" r="170" fill="#d29a26" opacity="0.22"/>
  <circle cx="640" cy="650" r="130" fill="#1fa2ff" opacity="0.15"/>

  <!-- Bloco da marca (à esquerda) -->
  <g transform="translate(110, 195)">
    <rect width="230" height="230" rx="40" fill="#0b7a4b" stroke="#d29a26" stroke-width="6"/>
    <!-- Camisa estilizada -->
    <path d="M70 58 L38 85 L58 148 L85 132 V202 H145 V132 L172 148 L192 85 L160 58 C148 80 82 80 70 58 Z" fill="#fff"/>
    <!-- Estrelinha no peito -->
    <path d="M115 108 l9 18 20 3 -14 14 4 20 -19 -10 -19 10 4 -20 -14 -14 20 -3z" fill="#d29a26"/>
  </g>

  <!-- Marca textual -->
  <text x="400" y="270"
        font-family="'Impact', 'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-weight="900" font-size="138" fill="#ffffff" letter-spacing="6">FIGURAMA</text>

  <text x="400" y="332"
        font-family="'Impact', 'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-weight="700" font-size="44" fill="#d29a26" letter-spacing="5">TROCAS DA COPA 2026</text>

  <!-- Linha decorativa -->
  <rect x="400" y="362" width="120" height="6" rx="3" fill="#1fa2ff"/>

  <text x="400" y="432"
        font-family="Arial, 'Helvetica Neue', sans-serif"
        font-weight="700" font-size="30" fill="#ffffff" fill-opacity="0.92">
    Marque suas figurinhas · Ache trocas · Complete o álbum
  </text>

  <!-- Etiqueta de chips -->
  <g transform="translate(400, 470)">
    <rect width="180" height="42" rx="21" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
    <text x="90" y="29" text-anchor="middle"
          font-family="Arial, sans-serif" font-weight="700" font-size="20" fill="#fff" letter-spacing="1">48 SELEÇÕES</text>

    <rect x="200" width="150" height="42" rx="21" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
    <text x="275" y="29" text-anchor="middle"
          font-family="Arial, sans-serif" font-weight="700" font-size="20" fill="#fff" letter-spacing="1">12 GRUPOS</text>

    <rect x="370" width="170" height="42" rx="21" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
    <text x="455" y="29" text-anchor="middle"
          font-family="Arial, sans-serif" font-weight="700" font-size="20" fill="#fff" letter-spacing="1">980 FIGURINHAS</text>
  </g>

  <!-- Barra inferior dourada -->
  <rect y="610" width="1200" height="20" fill="#d29a26"/>
</svg>
